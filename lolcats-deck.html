<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoLCATs — ICLR 2025</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <!-- External dependencies (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Project styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/transitions.css">
  <link rel="stylesheet" href="css/lolcats-deck.css">
</head>
<body>
  <!-- Particle background -->
  <canvas id="particle-canvas"></canvas>

  <!-- Slide deck container -->
  <div id="deck">
    <div id="slides-container"></div>
  </div>

  <!-- Progress bar -->
  <div id="progress-bar">
    <div id="progress-fill"></div>
  </div>

  <!-- Slide counter -->
  <div id="slide-counter"></div>

  <!-- Navigation hints -->
  <div id="nav-hint">Use arrow keys or swipe to navigate</div>

  <!-- Blog links -->
  <div class="blog-link-group">
    <a href="lolcats.html" class="blog-link">Blog Post &rarr;</a>
  </div>

  <!-- Set manifest before engine loads -->
  <script>window.SLIDES_MANIFEST = 'lolcats-slides.json';</script>

  <!-- Project scripts -->
  <script src="js/renderer.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/ai-demos.js"></script>
  <script src="js/lolcats-deck.js"></script>
  <script src="js/engine.js"></script>
</body>
</html>
